<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 상세 — RIVANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    body { font-family: var(--font-ko); padding-top: var(--header-h); }
    .breadcrumb { padding: 20px 0; font-size: 13px; color: var(--desc-text); display: flex; gap: 8px; align-items: center; }
    .breadcrumb a { color: var(--desc-text); } .breadcrumb a:hover { color: var(--black); }
    .breadcrumb span { color: var(--line); }
    .detail-layout { display: grid; grid-template-columns: 1fr 480px; gap: 60px; padding-bottom: 80px; align-items: start; }
    .detail-images { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-images img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: var(--radius-input); transition: transform var(--trans-slow); }
    .detail-images img:hover { transform: scale(1.02); }
    .detail-info { position: sticky; top: calc(var(--header-h) + 24px); }
    .detail-wish { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    .wish-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--desc-text); cursor: pointer; padding: 8px 12px; border: 1px solid var(--line); border-radius: var(--radius-btn); transition: all var(--trans-fast); }
    .wish-btn:hover, .wish-btn.active { border-color: var(--accent); color: var(--accent); }
    .detail-brand { font-size: 12px; font-weight: 700; color: var(--desc-text); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .detail-name { font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
    .detail-summary { font-size: 14px; color: var(--desc-text); line-height: 1.7; margin-bottom: 20px; }
    .detail-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 14px; color: var(--desc-text); }
    .stars { color: #fbbf24; letter-spacing: 2px; }
    .detail-price { padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
    .price-row { display: flex; align-items: center; justify-content: space-between; }
    .detail-original { font-size: 16px; color: var(--desc-text); text-decoration: line-through; font-family: var(--font-en); }
    .detail-sale { font-family: var(--font-en); font-size: 28px; font-weight: 800; color: var(--black); }
    .detail-rate { background: var(--accent); color: var(--white); font-family: var(--font-en); font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 4px; }
    .option-label { font-size: 13px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .color-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color var(--trans-fast); position: relative; }
    .color-btn.active, .color-btn:hover { border-color: var(--black); }
    .color-btn::after { content:''; position:absolute; inset:3px; border-radius:50%; background:inherit; }
    .size-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .size-btn { min-width: 56px; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: var(--radius-input); font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; transition: all var(--trans-fast); font-family: var(--font-en); }
    .size-btn:hover:not(.disabled), .size-btn.active { border-color: var(--black); background: var(--black); color: var(--white); }
    .size-btn.disabled { color: var(--line); cursor: not-allowed; border-color: var(--line); }
    /* 선택된 옵션 영역 */
    .selected-options { background: var(--bg-light); border-radius: var(--radius-input); padding: 16px; margin-bottom: 20px; min-height: 60px; }
    .selected-placeholder { font-size: 13px; color: var(--desc-text); text-align: center; padding: 8px 0; }
    .selected-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .selected-item:last-child { border-bottom: none; }
    .selected-item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .selected-item-opt { font-size: 12px; color: var(--desc-text); }
    .selected-item-qty { display: flex; align-items: center; gap: 12px; }
    .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    .qty-ctrl button { width: 28px; height: 28px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    .qty-ctrl button:hover { background: var(--bg-light); }
    .qty-ctrl span { width: 32px; text-align: center; font-size: 14px; font-weight: 600; }
    .selected-item-price { font-family: var(--font-en); font-size: 15px; font-weight: 700; }
    .order-total { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; font-size: 15px; font-weight: 600; }
    .order-total-price { font-family: var(--font-en); font-size: 24px; font-weight: 800; color: var(--accent); }
    .btn-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-actions .btn { justify-content: center; }
    .detail-tabs { margin-top: 80px; }
    .detail-tab-content { padding: 40px 0; }
    .review-card { display: flex; gap: 16px; padding: 24px 0; border-bottom: 1px solid var(--line); }
    .review-card:last-child { border-bottom: none; }
    .review-imgs { display: flex; gap: 8px; margin-top: 12px; }
    .review-imgs img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-input); }
    .qna-item { padding: 20px 0; border-bottom: 1px solid var(--line); }
    .qna-item .q { font-weight: 600; margin-bottom: 8px; display: flex; gap: 8px; }
    .qna-item .a { color: var(--desc-text); font-size: 14px; display: flex; gap: 8px; padding-left: 4px; }
    @media(max-width:1024px) { .detail-layout { grid-template-columns: 1fr; } .detail-info { position: static; } .detail-images { grid-template-columns: 1fr 1fr; } }
    @media(max-width:768px) { .detail-images { grid-template-columns: 1fr; } .btn-actions { grid-template-columns: 1fr; } }
  </style>
</head>

  <script>
  // ── 전역 상태 ──
  let _product = null;
  let _activeSkus = [];
  let _selColorId = null;
  let _selColorName = '';
  let _selSizeId = null;
  let _selSizeName = '';
  let _qty = 1;
  let _hasColorOpts = false;
  let _hasSizeOpts = false;

  const COLOR_MAP = {
    Black:'#111111', White:'#ffffff', Gray:'#9ca3af',
    Navy:'#1e3a5f', Red:'#ef4444', Pink:'#f9a8d4',
    Orange:'#f97316', Green:'#22c55e', Blue:'#3b82f6'
  };

  function getCurrentSku() {
    if (!_selColorId && !_selSizeId) return _activeSkus[0] || null;
    return _activeSkus.find(s =>
      (_selColorId ? s.color_id === _selColorId : true) &&
      (_selSizeId  ? s.size_id  === _selSizeId  : true)
    ) || _activeSkus[0] || null;
  }

  function currentUnitPrice() {
    const sku = getCurrentSku();
    if (sku) return sku.sale_price || sku.price || 0;
    if (_product) {
      const prices = _activeSkus.map(s => s.sale_price || s.price).filter(Boolean);
      return prices.length ? Math.min(...prices) : 0;
    }
    return 0;
  }

  function updateSelected() {
    const el = document.getElementById('selectedOptions');
    const totalEl = document.getElementById('totalPrice');

    // 필수 옵션이 모두 선택되었을 때만 아이템 표시
    const colorDone = !_hasColorOpts || _selColorName;
    const sizeDone  = !_hasSizeOpts  || _selSizeName;

    if (!_product || !colorDone || !sizeDone) {
      el.innerHTML = '';
      totalEl.textContent = '0원';
      return;
    }

    const unitPrice = currentUnitPrice();
    const optText = [_selColorName, _selSizeName].filter(Boolean).join(' / ');

    el.innerHTML = `
      <div class="selected-item">
        <div style="flex:1;min-width:0">
          <p class="selected-item-name">${_product.name}</p>
          ${optText ? `<p class="selected-item-opt">${optText}</p>` : ''}
        </div>
        <div class="selected-item-qty">
          <div class="qty-ctrl">
            <button onclick="changeQty(-1)">−</button>
            <span id="qtyDisplay">${_qty}</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <span class="selected-item-price">${RivantApp.fmtPrice(unitPrice * _qty)}</span>
          <button onclick="clearSelection()" title="삭제"
            style="width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:var(--white);font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--desc-text)">✕</button>
        </div>
      </div>`;
    totalEl.textContent = RivantApp.fmtPrice(unitPrice * _qty);
  }

  window.selectColor = function(btn, color, cid) {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _selColorName = color;
    _selColorId = cid || null;
    document.getElementById('selectedColorLabel').textContent = color;
    updateSelected();
  };

  window.selectSize = function(btn, size, sid) {
    if (btn.classList.contains('disabled')) return;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _selSizeName = size;
    _selSizeId = sid || null;
    updateSelected();
  };

  window.clearSelection = function() {
    _selColorId = null; _selColorName = '';
    _selSizeId  = null; _selSizeName  = '';
    _qty = 1;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    const lbl = document.getElementById('selectedColorLabel');
    if (lbl) lbl.textContent = '-';
    updateSelected();
  };

  window.changeQty = function(delta) {
    _qty = Math.max(1, _qty + delta);
    const el = document.getElementById('qtyDisplay');
    if (el) el.textContent = _qty;
    const unitPrice = currentUnitPrice();
    const priceEl = document.querySelector('.selected-item-price');
    if (priceEl) priceEl.textContent = RivantApp.fmtPrice(unitPrice * _qty);
    document.getElementById('totalPrice').textContent = RivantApp.fmtPrice(unitPrice * _qty);
  };

  window.addToCart = function() {
    if (!_product) { alert('상품 정보를 불러오는 중입니다.'); return; }
    if ((_hasColorOpts && !_selColorName) || (_hasSizeOpts && !_selSizeName)) {
      alert('옵션을 선택해주세요.'); return;
    }
    const sku = getCurrentSku();
    RivantApp.Cart.add({
      sku: sku?.sku || `${_product.id}-${_selColorName}-${_selSizeName}`,
      name: _product.name,
      option: [_selColorName, _selSizeName].filter(Boolean).join(' / ') || '기본',
      price: sku?.price || currentUnitPrice(),
      salePrice: currentUnitPrice(),
      qty: _qty,
      image: _product.thumbnail
    });
    RivantApp.showToast('장바구니에 담았습니다!');
    setTimeout(() => { window.location.href = 'cart.html'; }, 600);
  };

  window.buyNow = function() {
    if (!_product) { alert('상품 정보를 불러오는 중입니다.'); return; }
    if ((_hasColorOpts && !_selColorName) || (_hasSizeOpts && !_selSizeName)) {
      alert('옵션을 선택해주세요.'); return;
    }
    const sku = getCurrentSku();
    RivantApp.Cart.add({
      sku: sku?.sku || `${_product.id}-${_selColorName}-${_selSizeName}`,
      name: _product.name,
      option: [_selColorName, _selSizeName].filter(Boolean).join(' / ') || '기본',
      price: sku?.price || currentUnitPrice(),
      salePrice: currentUnitPrice(),
      qty: _qty,
      image: _product.thumbnail
    });
    window.location.href = 'checkout.html';
  };

  window.toggleWish = function() {
    const btn = document.getElementById('wishBtn');
    btn.classList.toggle('active');
    const isWished = btn.classList.contains('active');
    btn.querySelector('svg').setAttribute('fill', isWished ? 'currentColor' : 'none');
    RivantApp.showToast(isWished ? '찜 목록에 추가했습니다.' : '찜 목록에서 제거했습니다.');
  };

  // 탭 전환
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.detail-tab-content').forEach(el => el.style.display = 'none');
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).style.display = 'block';
    });
  });

  // ── REST API 직접 데이터 로드 (SDK 불필요) ──
  (async function () {
    const _SB_URL = 'https://icpadkshsayuzpgiaojh.supabase.co';
    const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcGFka3Noc2F5dXpwZ2lhb2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjU5NzMsImV4cCI6MjA5NjgwMTk3M30.0dn3CqhajZecDVGUSX6tKo6JnCKYLPUBkon9eUPs6Dc';
    const _H = { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY };

    async function sbGet(table, params) {
      const url = new URL(_SB_URL + '/rest/v1/' + table);
      Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
      const r = await fetch(url.toString(), { headers: _H });
      if (!r.ok) throw new Error(table + ' ' + r.status);
      return r.json();
    }

    const pid = new URLSearchParams(location.search).get('id') || '1';

    try {
      // ① 상품 기본 정보 먼저 (핵심 — 실패 시 오류 표시)
      const products = await sbGet('products', {
        id: 'eq.' + pid,
        select: 'id,name,summary,thumbnail,brand_id',
        limit: '1'
      });
      const p = products[0];
      if (!p) {
        document.getElementById('detailName').textContent = '상품을 찾을 수 없습니다.';
        return;
      }

      // ② 나머지 데이터 병렬 fetch — 개별 실패는 빈 배열로 처리
      const [skus, options, images, descs, stats] = await Promise.all([
        sbGet('product_skus',     { product_id: 'eq.'+pid, select: 'id,color_id,size_id,price,sale_price,sku,status' }).catch(() => []),
        sbGet('product_options',  { product_id: 'eq.'+pid, select: 'id,name' }).catch(() => []),
        sbGet('product_images',   { product_id: 'eq.'+pid, select: 'image_url,type,sort_order', order: 'sort_order' }).catch(() => []),
        sbGet('product_descriptions', { product_id: 'eq.'+pid, select: 'content_html', limit: '1' }).catch(() => []),
        sbGet('products_statistics',  { product_id: 'eq.'+pid, select: 'review_count,review_average,wish_count', limit: '1' }).catch(() => []),
      ]);

      // ③ 브랜드명
      let brandName = '';
      if (p.brand_id) {
        try {
          const brands = await sbGet('brands', { id: 'eq.'+p.brand_id, select: 'name', limit: '1' });
          brandName = brands[0]?.name || '';
        } catch {}
      }

      // ④ 옵션 값
      let optionValues = [];
      if (options.length > 0) {
        try {
          const optIds = options.map(o => o.id).join(',');
          optionValues = await sbGet('product_option_values', {
            option_id: 'in.('+optIds+')',
            select: 'id,option_id,value,sort_order',
            order: 'sort_order'
          });
        } catch {}
      }
      options.forEach(opt => {
        opt.product_option_values = optionValues.filter(v => v.option_id === opt.id);
      });

      _product = p;

      // 제목·브레드크럼
      document.title = `${p.name} — RIVANT`;
      document.getElementById('breadName').textContent = p.name;
      document.getElementById('detailName').textContent = p.name;
      document.getElementById('detailSummary').textContent = p.summary || '';
      if (brandName) document.getElementById('detailBrand').textContent = brandName;

      // 이미지
      const defaultImgs = [
        'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&h=800&fit=crop&auto=format',
        'https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=600&h=800&fit=crop&auto=format',
        'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600&h=800&fit=crop&auto=format',
        'https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=600&h=800&fit=crop&auto=format',
      ];
      const imgList = images.length >= 4 ? images.slice(0,4) : [...images, ...defaultImgs.slice(images.length)].slice(0,4);
      document.getElementById('detailImages').innerHTML = imgList.map((img, i) => {
        const url = typeof img === 'string' ? img : (img.image_url || defaultImgs[i]);
        return `<img src="${url}" alt="상품 이미지 ${i+1}" onerror="this.src='${defaultImgs[i % 4]}'" />`;
      }).join('');

      // 통계
      const st = stats[0];
      if (st) {
        const avg = Number(st.review_average || 0).toFixed(1);
        const cnt = Number(st.review_count || 0);
        const starFull = Math.round(st.review_average || 0);
        document.getElementById('detailRating').innerHTML = `
          <span class="stars">${'★'.repeat(starFull)}${'☆'.repeat(5-starFull)}</span>
          <span>${avg} (${cnt.toLocaleString()}개 리뷰)</span>
          <span>·</span>
          <span>찜 ${Number(st.wish_count||0).toLocaleString()}개</span>`;
        document.getElementById('reviewTabBtn').textContent = `리뷰 (${cnt})`;
        document.getElementById('reviewAvg').textContent = avg;
        document.getElementById('reviewStars').textContent = '★'.repeat(starFull) + '☆'.repeat(5-starFull);
        document.getElementById('reviewCountLabel').textContent = `${cnt}개 리뷰`;
      }

      // 가격 (SKU)
      _activeSkus = skus.filter(s => s.status === 'ACTIVE');
      if (_activeSkus.length > 0) {
        const prices    = _activeSkus.map(s => s.sale_price || s.price);
        const origPrices = _activeSkus.map(s => s.price);
        const minPrice  = Math.min(...prices);
        const minOrig   = Math.min(...origPrices);
        const hasSale   = _activeSkus.some(s => s.sale_price && s.sale_price < s.price);
        const discRate  = hasSale && minOrig > 0 ? Math.round((1 - minPrice / minOrig) * 100) : 0;

        document.getElementById('detailSale').textContent = `${minPrice.toLocaleString()}원`;
        if (hasSale) {
          const origEl = document.getElementById('detailOriginal');
          origEl.textContent = `${minOrig.toLocaleString()}원`;
          origEl.style.display = '';
        }
        if (discRate > 0) {
          const rateEl = document.getElementById('detailRate');
          rateEl.textContent = `${discRate}% OFF`;
          rateEl.style.display = '';
        }
      }

      // 옵션 파싱
      const colorOpt  = options.find(o => o.name === '색상');
      const sizeOpt   = options.find(o => o.name === '사이즈');
      const colorVals = (colorOpt?.product_option_values || []).sort((a,b) => a.sort_order - b.sort_order);
      const sizeVals  = (sizeOpt?.product_option_values  || []).sort((a,b) => a.sort_order - b.sort_order);

      // 색상 버튼
      if (colorVals.length) {
        _hasColorOpts = true;
        document.getElementById('colorSection').style.display = '';
        document.getElementById('colorOptions').innerHTML = colorVals.map((c, i) =>
          `<button class="color-btn ${i===0?'active':''}"
            style="background:${COLOR_MAP[c.value]||'#ccc'};${c.value==='White'?'border:1.5px solid #e8e8e8':''}"
            onclick="selectColor(this,'${c.value}',${c.id})"
            title="${c.value}" data-cid="${c.id}"></button>`
        ).join('');
        _selColorId   = colorVals[0].id;
        _selColorName = colorVals[0].value;
        document.getElementById('selectedColorLabel').textContent = _selColorName;
      }

      // 사이즈 버튼
      if (sizeVals.length) {
        _hasSizeOpts = true;
        document.getElementById('sizeSection').style.display = '';
        document.getElementById('sizeOptions').innerHTML = sizeVals.map((s, i) => {
          const hasSku = _activeSkus.some(sk => sk.size_id === s.id);
          return `<button class="size-btn ${i===0&&hasSku?'active':''} ${hasSku?'':'disabled'}"
            onclick="selectSize(this,'${s.value}',${s.id})"
            data-sid="${s.id}">${s.value}</button>`;
        }).join('');
        const firstAvail = sizeVals.find(s => _activeSkus.some(sk => sk.size_id === s.id));
        if (firstAvail) { _selSizeId = firstAvail.id; _selSizeName = firstAvail.value; }
      }

      // 상품 상세설명
      if (descs[0]?.content_html) {
        document.getElementById('tabInfoContent').innerHTML = descs[0].content_html;
      }

      updateSelected();

      // 리뷰 (실패해도 상품 표시에 무관)
      try {
        const reviews = await sbGet('reviews', {
          product_id: 'eq.'+pid, select: 'id,rating,content,created_at',
          order: 'created_at.desc', limit: '10'
        });
        if (reviews && reviews.length > 0) {
          document.getElementById('reviewList').innerHTML = reviews.map(r => `
            <div class="review-card">
              <div style="flex-shrink:0"><div style="width:40px;height:40px;border-radius:50%;background:var(--bg-light);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div></div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
                  <span style="font-weight:600">고객</span>
                  <span style="color:#fbbf24">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                  <span style="font-size:12px;color:var(--desc-text)">${(r.created_at||'').slice(0,10)}</span>
                </div>
                <p style="font-size:14px;line-height:1.7;color:var(--sub-text)">${r.content||''}</p>
              </div>
            </div>`).join('');
        }
      } catch {}

      // Q&A (실패해도 상품 표시에 무관)
      try {
        const qnas = await sbGet('product_questions', {
          product_id: 'eq.'+pid, select: 'id,title,content,status,created_at',
          order: 'created_at.desc', limit: '10'
        });
        if (qnas && qnas.length > 0) {
          document.querySelector('[data-tab="tab-qna"]').textContent = `Q&A (${qnas.length})`;
          document.getElementById('qnaList').innerHTML = qnas.map(q => `
            <div class="qna-item">
              <div class="q"><span style="color:var(--accent);font-weight:700">Q</span> ${q.title}</div>
              ${q.content ? `<p style="font-size:13px;color:var(--desc-text);padding-left:18px;margin-top:4px">${q.content}</p>` : ''}
              <div style="padding-left:18px;margin-top:8px"><span style="font-size:11px;background:#fff4e5;color:#c47600;padding:2px 8px;border-radius:4px;font-weight:700">답변대기</span></div>
            </div>`).join('');
        }
      } catch {}

    } catch (err) {
      console.error('Detail load error:', err);
      document.getElementById('detailName').textContent = '상품 정보를 불러올 수 없습니다.';
    }
  })();
  </script>
</body>
</html>
