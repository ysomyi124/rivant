<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 — RIVANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    body { font-family: var(--font-ko); padding-top: var(--header-h); }
    .page-header { padding: 48px 0 32px; border-bottom: 1px solid var(--line); margin-bottom: 48px; }
    .page-header h1 { font-family: var(--font-en); font-size: 32px; font-weight: 800; text-transform: uppercase; }
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 48px; align-items: start; padding-bottom: 80px; }
    .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 2px solid var(--black); margin-bottom: 0; }
    .cart-header-check { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
    .cart-header-check input { width: 18px; height: 18px; accent-color: var(--black); cursor: pointer; }
    .cart-header-actions { display: flex; gap: 12px; }
    .cart-header-actions button { font-size: 13px; color: var(--desc-text); text-decoration: underline; cursor: pointer; }
    .cart-header-actions button:hover { color: var(--black); }
    .cart-item { display: grid; grid-template-columns: 24px 120px 1fr auto; gap: 20px; align-items: center; padding: 24px 0; border-bottom: 1px solid var(--line); }
    .cart-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--black); cursor: pointer; }
    .cart-item__img { aspect-ratio: 4/5; border-radius: var(--radius-input); overflow: hidden; background: var(--bg-light); }
    .cart-item__img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item__info { display: flex; flex-direction: column; gap: 6px; }
    .cart-item__name { font-size: 15px; font-weight: 600; line-height: 1.4; }
    .cart-item__option { font-size: 13px; color: var(--desc-text); }
    .cart-item__option-change { font-size: 12px; color: var(--black); text-decoration: underline; cursor: pointer; margin-top: 2px; }
    .cart-item__qty { display: flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: var(--radius-input); overflow: hidden; width: fit-content; margin-top: 8px; }
    .qty-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background var(--trans-fast); }
    .qty-btn:hover { background: var(--bg-light); }
    .qty-input { width: 44px; height: 36px; text-align: center; font-size: 14px; font-weight: 600; border: none; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
    .cart-item__right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .cart-item__price { font-family: var(--font-en); font-size: 16px; font-weight: 700; }
    .cart-remove { color: var(--desc-text); cursor: pointer; transition: color var(--trans-fast); }
    .cart-remove:hover { color: #e53e3e; }
    /* Summary */
    .cart-summary { background: var(--bg-light); border-radius: var(--radius-card); padding: 32px; position: sticky; top: calc(var(--header-h) + 24px); }
    .summary-title { font-family: var(--font-en); font-size: 18px; font-weight: 700; margin-bottom: 24px; text-transform: uppercase; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-row .label { color: var(--desc-text); }
    .summary-row .value { font-weight: 600; font-family: var(--font-en); }
    .summary-total { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 0; font-size: 16px; font-weight: 700; margin-top: 8px; border-top: 2px solid var(--black); }
    .summary-total .total-price { font-family: var(--font-en); font-size: 22px; color: var(--accent); }
    .btn-order { width: 100%; justify-content: center; margin-top: 20px; }
    .cart-empty { text-align: center; padding: 80px 20px; }
    .cart-empty p { font-size: 16px; color: var(--desc-text); margin: 20px 0 32px; }
    @media(max-width:1024px) { .cart-layout { grid-template-columns: 1fr; } .cart-summary { position: static; } }
    @media(max-width:768px) { .cart-item { grid-template-columns: 20px 90px 1fr; } .cart-item__right { grid-column: 2 / -1; flex-direction: row; justify-content: space-between; align-items: center; } }
  </style>
</head>
<body>
  <div class="overlay-bg"></div>
  <header id="header" class="scrolled">
    <div class="header-inner">
      <a href="../index.html" class="header-logo">
        <img src="../images/logo_w.png" alt="RIVANT" class="logo-white" />
        <img src="../images/logo_b.png" alt="RIVANT" class="logo-black" />
      </a>
      <nav class="header-nav">
        <div class="nav-item"><a href="product-list.html?cat=men">Men</a></div>
        <div class="nav-item"><a href="product-list.html?cat=women">Women</a></div>
        <div class="nav-item"><a href="product-list.html?cat=shoes">Shoes</a></div>
        <div class="nav-item"><a href="product-list.html?cat=acc">ACC</a></div>
        <div class="nav-item"><a href="promotion.html">Promotion</a></div>
        <div class="nav-item"><a href="review.html">Review</a></div>
      </nav>
      <div class="header-icons">
        <a href="cart.html" class="icon-btn" aria-label="장바구니">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge" style="display:none">0</span>
        </a>
        <a href="mypage.html" class="icon-btn mypage-link" aria-label="마이페이지" data-mypage="mypage.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <button class="mobile-menu-btn" aria-label="메뉴"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" aria-label="모바일 메뉴">
    <div class="mobile-nav-header">
      <a href="../index.html"><img src="../images/logo_b.png" alt="RIVANT" style="height:22px" /></a>
      <button class="mobile-nav-close search-close" aria-label="메뉴 닫기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mobile-nav-body">
      <div class="mobile-nav-item"><a href="product-list.html?cat=men">Men</a></div>
      <div class="mobile-nav-item"><a href="product-list.html?cat=women">Women</a></div>
      <div class="mobile-nav-item"><a href="product-list.html?cat=shoes">Shoes</a></div>
      <div class="mobile-nav-item"><a href="product-list.html?cat=acc">ACC</a></div>
      <div class="mobile-nav-item"><a href="promotion.html">Promotion</a></div>
    </div>
    <div class="mobile-nav-icons">
      <a href="login.html" class="btn btn-secondary btn-sm">로그인</a>
      <a href="signup.html" class="btn btn-primary btn-sm">회원가입</a>
    </div>
  </nav>

  <main class="inner">
    <div class="page-header">
      <h1>Cart</h1>
    </div>

    <!-- Empty state (shown when no items) -->
    <div class="cart-empty" id="cartEmpty" style="display:none">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#e8e8e8" stroke-width="1.5" style="margin:0 auto 16px"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <p>장바구니가 비어있습니다.</p>
      <a href="product-list.html" class="btn btn-primary">쇼핑 계속하기</a>
    </div>

    <!-- Cart content -->
    <div class="cart-layout" id="cartContent">
      <div>
        <div class="cart-header">
          <div class="cart-header-check">
            <input type="checkbox" id="checkAll" checked />
            <label for="checkAll">전체선택 (<span id="totalCount">0</span>)</label>
          </div>
          <div class="cart-header-actions">
            <button onclick="deleteSelected()">선택삭제</button>
            <button onclick="deleteAll()">전체삭제</button>
          </div>
        </div>
        <div id="cartItems"></div>
        <div style="display:flex;gap:12px;margin-top:24px">
          <a href="product-list.html" class="btn btn-secondary btn-sm">쇼핑 계속하기</a>
          <button class="btn btn-secondary btn-sm" onclick="deleteSelected()">선택상품 주문</button>
          <button class="btn btn-primary btn-sm" onclick="orderAll()">전체상품 주문</button>
        </div>
      </div>

      <!-- Summary -->
      <div class="cart-summary">
        <h2 class="summary-title">Order Summary</h2>
        <div class="summary-row"><span class="label">주문금액</span><span class="value" id="subTotal">0원</span></div>
        <div class="summary-row"><span class="label">배송비</span><span class="value" id="shipping">3,000원</span></div>
        <div class="summary-row"><span class="label">할인금액</span><span class="value" style="color:var(--accent)" id="discount">-0원</span></div>
        <div class="summary-total">
          <span>합계</span>
          <span class="total-price" id="totalPrice">0원</span>
        </div>
        <button class="btn btn-primary btn-lg btn-order" onclick="orderAll()">주문하기</button>
        <p style="text-align:center;font-size:12px;color:var(--desc-text);margin-top:12px">5만원 이상 구매 시 무료배송</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/header.js"></script>
  <script>
    const { Cart, fmtPrice } = RivantApp;

    function renderCart() {
      const items = Cart.get();
      const cartItems = document.getElementById('cartItems');
      const cartEmpty = document.getElementById('cartEmpty');
      const cartContent = document.getElementById('cartContent');
      document.getElementById('totalCount').textContent = items.length;

      if (items.length === 0) {
        cartEmpty.style.display = 'block';
        cartContent.style.display = 'none';
        return;
      }
      cartEmpty.style.display = 'none';
      cartContent.style.display = 'grid';

      cartItems.innerHTML = items.map((item, i) => `
        <div class="cart-item" data-index="${i}">
          <input type="checkbox" class="item-check" checked />
          <div class="cart-item__img">
            <img src="${item.image || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=240&h=300&fit=crop&auto=format'}" alt="${item.name}" loading="lazy" />
          </div>
          <div class="cart-item__info">
            <p class="cart-item__name">${item.name || '상품명'}</p>
            <p class="cart-item__option">${item.option || '옵션 없음'}</p>
            <span class="cart-item__option-change">옵션 변경</span>
            <div class="cart-item__qty">
              <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
              <input type="number" class="qty-input" value="${item.qty || 1}" min="1" onchange="setQty(${i}, this.value)" />
              <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
          </div>
          <div class="cart-item__right">
            <span class="cart-item__price">${fmtPrice((item.salePrice || item.price || 0) * (item.qty || 1))}</span>
            <button class="cart-remove" onclick="removeItem(${i})" title="삭제">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      `).join('');

      updateSummary();
    }

    function updateSummary() {
      const items = Cart.get();
      const sub = Cart.total();
      const shipping = sub >= 50000 ? 0 : 3000;
      document.getElementById('subTotal').textContent = fmtPrice(sub);
      document.getElementById('shipping').textContent = shipping === 0 ? '무료' : fmtPrice(shipping);
      document.getElementById('discount').textContent = '-0원';
      document.getElementById('totalPrice').textContent = fmtPrice(sub + shipping);
    }

    function changeQty(i, delta) {
      const items = Cart.get();
      items[i].qty = Math.max(1, (items[i].qty || 1) + delta);
      Cart.save(items);
      renderCart();
    }
    function setQty(i, val) {
      const items = Cart.get();
      items[i].qty = Math.max(1, parseInt(val) || 1);
      Cart.save(items);
      renderCart();
    }
    function removeItem(i) {
      const items = Cart.get();
      items.splice(i, 1);
      Cart.save(items);
      renderCart();
    }
    function deleteSelected() {
      const checks = document.querySelectorAll('.item-check');
      const items = Cart.get().filter((_, i) => !checks[i]?.checked);
      Cart.save(items);
      renderCart();
    }
    function deleteAll() {
      if (confirm('장바구니를 전체 비우시겠습니까?')) { Cart.clear(); renderCart(); }
    }
    function orderAll() {
      if (Cart.get().length === 0) { alert('장바구니가 비어있습니다.'); return; }
      window.location.href = 'checkout.html';
    }

    if (window.location.hash === '#checkout') {
      window.addEventListener('load', () => { setTimeout(orderAll, 300); });
    }

    // Add demo items if empty
    if (Cart.get().length === 0) {
      Cart.add({ sku: 'demo-1', name: 'Cloud Runner Pro', option: 'Black / 270mm', price: 159000, salePrice: 127200, qty: 1 });
      Cart.add({ sku: 'demo-2', name: 'Motion Flex Training Tee', option: 'White / M', price: 49000, salePrice: 34300, qty: 2 });
    }
    renderCart();
  </script>
</body>
</html>
